<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'none'; img-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    >
    <meta name="referrer" content="no-referrer">
    <title>Astra Shell Static Mock</title>
    <link rel="stylesheet" href="./styles/tokens.css">
    <link rel="stylesheet" href="./styles/app.css">
    <script defer src="./scripts/mock-data.js"></script>
    <script defer src="./scripts/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content" data-i18n="action.skipToContent">본문으로 이동</a>

    <noscript>
      Astra Shell static mock requires JavaScript for local-only screen switching. No OS command, native bridge, storage API, or network request is used.
    </noscript>

    <main class="shell-stage" id="main-content" tabindex="-1" aria-label="Astra Shell static mock">
      <section class="screen-root" id="screen-root" aria-live="polite" tabindex="-1"></section>
    </main>

    <div class="toast-region" id="toast-root" aria-live="polite" aria-atomic="true"></div>
  </body>
</html>
